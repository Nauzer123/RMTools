name: Build RM Tools

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Verify mod sources
        run: |
          test -f src/main/java/dev/raidmine/rmtools/RMToolsClient.java
          test -f src/main/resources/fabric.mod.json
          echo "Source files found:"
          find src/main -type f | sort

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build Fabric mod
        run: gradle clean remapJar --refresh-dependencies --stacktrace

      - name: Inspect result
        run: |
          ls -lh build/libs
          jar tf build/libs/rm-tools-1.0.0.jar | head -100

      - name: Upload playable mod
        uses: actions/upload-artifact@v4
        with:
          name: RMTools-test
          path: build/libs/rm-tools-1.0.0.jar
          if-no-files-found: error
